services:
  # ------------------------------------
  # 1. Database Service (PostgreSQL)
  # ------------------------------------
  postgres:
    image: postgres:15-alpine
    container_name: rbac_postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-rbac_system}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - rbac_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ------------------------------------
  # 2. Cache Service (Redis)
  # ------------------------------------
  redis:
    image: redis:alpine
    container_name: rbac_redis
    restart: always
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - rbac_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ------------------------------------
  # 3. Application Service (NestJS)
  # ------------------------------------
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rbac_api
    restart: on-failure
    depends_on:
      postgres:
        condition: service_healthy # Đợi database sống hẳn mới chạy api
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - NODE_ENV=development
      - DENTAL_UPLOAD_DIR=/app/uploads/dental/temp
      - DENTAL_OUTPUT_DIR=/app/uploads/dental/converted
    ports:
      - "${PORT:-8080}:8080"
    # Ghi đè lệnh command để tự động tạo bảng
    command: >
      sh -c "sleep 5 && npx drizzle-kit push && npm run start:dev"
    volumes:
      - .:/app
      - /app/node_modules
      - ./uploads:/app/uploads
    networks:
      - rbac_network

volumes:
  postgres_data:
  # Bỏ redis_data nếu không cần lưu cache lâu dài

networks:
  rbac_network:
    driver: bridge
