services:
  postgres:
    image: postgres:15-alpine
    container_name: dental_postgres_prod
    restart: always
    env_file:
      - ../.env.production
    environment:
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-dental_system}
    volumes:
      - pgdata_prod:/var/lib/postgresql/data
    networks:
      - dental_prod_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_NAME:-dental_system}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G

  redis:
    image: redis:7-alpine
    container_name: dental_redis_prod
    restart: always
    networks:
      - dental_prod_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M

  api:
    build:
      context: ..
      dockerfile: infra/docker/Dockerfile
    container_name: dental_api_prod
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ../.env.production
    environment:
      - DB_HOST=postgres
      - REDIS_HOST=redis
      - RUN_MIGRATIONS=true
      - NODE_ENV=production
      - NODE_OPTIONS=--max-old-space-size=1536
    volumes:
      - dental_data:/app/uploads
      - api_logs:/app/logs
    ports:
      - "8080:8080"
    networks:
      - dental_prod_net
      - lvt_tunnel_net
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G

networks:
  dental_prod_net:
    driver: bridge

  lvt_tunnel_net:
    # SỬ DỤNG BIẾN MÔI TRƯỜNG TẠI ĐÂY
    # Nếu không tìm thấy biến, nó sẽ báo lỗi hoặc bạn có thể set default (không khuyến khích nếu ID thay đổi)
    name: ${EXTERNAL_NETWORK_NAME} 
    external: true

volumes:
  pgdata_prod:
  dental_data:
  api_logs:
  
