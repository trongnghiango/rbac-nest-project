services:
  postgres:
    image: postgres:15-alpine
    container_name: rbac_postgres_prod
    restart: always
    env_file:
      - ../.env.production
    environment:
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-rbac_system}
    volumes:
      - pgdata_prod:/var/lib/postgresql/data
    shm_size: 1g # Bắt buộc cho Prod: Chống crash DB khi query dữ liệu nặng
    # XÓA PORTS Ở ĐÂY ĐỂ BẢO MẬT TUYỆT ĐỐI
    # ports:
    #   - "5432:5432"
    networks:
      - rbac_prod_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_NAME:-rbac_system}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        reservations:
          cpus: '0.5'
          memory: 512M
        limits:
          cpus: '2.0'
          memory: 2G

  redis:
    image: redis:7-alpine
    container_name: rbac_redis_prod
    restart: always
    env_file:
      - ../.env.production
    networks:
      - rbac_prod_net
    # XÓA PORTS
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M # Redis thường chỉ lưu Token/OTP nên tốn rất ít RAM

  telegram-api:
    image: aiogram/telegram-bot-api:latest
    container_name: rbac_telegram_api_prod
    restart: always
    env_file:
      - ../.env.production
    environment:
      TELEGRAM_API_ID: ${TELEGRAM_API_ID}
      TELEGRAM_API_HASH: ${TELEGRAM_API_HASH}
      TELEGRAM_STAT: 1
      TELEGRAM_LOCAL: 1
    volumes:
      - ${TELEGRAM_LOCAL_ROOT:-./telegram-data}:/var/lib/telegram-bot-api
    networks:
      - rbac_prod_net
    healthcheck: # Thêm healthcheck cho Local Bot API
      test: ["CMD-SHELL", "stat /var/lib/telegram-bot-api || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        # Mức tài nguyên KHỞI ĐIỂM (Đảm bảo hệ điều hành luôn giữ phần này cho API)
        reservations:
          cpus: '0.5'
          memory: 512M
        # Mức tài nguyên TỐI ĐA (Tránh làm treo máy chủ)
        limits:
          cpus: '4.0' # Cho phép xài tối đa 4 Core để convert 3D cho lẹ
          memory: 4G  # RAM tối đa (Phải luôn LỚN HƠN mức max-old-space-size của Nodejs ít nhất 20%)

  api:
    build:
      context: ..
      dockerfile: infra/docker/Dockerfile
    container_name: rbac_api_prod
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      telegram-api:
        condition: service_healthy # Đợi API khỏe hẳn mới gọi API Server lên
    env_file:
      - ../.env.production
    environment:
      DB_HOST: postgres
      REDIS_HOST: redis
      TELEGRAM_API_ROOT: http://telegram-api:8081
      RUN_MIGRATIONS: "true"
      # 4. 
      RUN_SEEDS: ${RUN_SEEDS:-false}
      # 5. Tăng bộ nhớ RAM cho Node.js (Vận hành xử lý file 3D cần nhiều RAM)
      NODE_OPTIONS: --max-old-space-size=1536
    volumes:
      # Map thư mục Uploads chung (Data 3D, CSV, v.v...) vào /app/uploads
      - dental_data_prod:/app/uploads
      # Map thư mục Logs vào /app/logs
      - api_logs_prod:/app/logs
      # 💡 Trick siêu hay: Map CHUNG thư mục data Telegram vào API
      # NestJS (/app/telegram-data) sẽ nhìn thấy cùng file ảnh với Telegram Bot API (/var/lib/telegram-bot-api)
      - ${TELEGRAM_LOCAL_ROOT:-./telegram-data}:/app/telegram-data
      # Map thư mục chứa file CSV Seed
      - ../database/seeds:/app/database/seeds
    ports:
      - "${PORT:-8080}:8080" # Chỉ public cổng API ra ngoài (Hoặc trỏ qua Nginx/Traefik)
    networks:
      - rbac_prod_net
    healthcheck:
      test: ["CMD", "/healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

# ==========================================
# KHAI BÁO MẠNG VÀ Ổ ĐĨA ẢO (VOLUMES)
# ==========================================
networks:
  rbac_prod_net:
    driver: bridge

volumes:
  pgdata_prod:
  dental_data_prod:
  api_logs_prod:
