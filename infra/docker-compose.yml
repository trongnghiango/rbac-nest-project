services:
  postgres:
    image: postgres:15-alpine
    container_name: rbac_db_dev
    environment:
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-rbac_system}
    ports:
      - "5432:5432"
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    networks:
      - rbac_dev_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    container_name: rbac_redis_dev
    ports:
      - "6379:6379"
    networks:
      - rbac_dev_net

  api:
    build:
      context: ..
      dockerfile: infra/docker/Dockerfile.dev
    container_name: rbac_api_dev
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ../.env
    environment:
      - DB_HOST=postgres
      - REDIS_HOST=redis
      - RUN_MIGRATIONS=true
      - NODE_ENV=development
    volumes:
      - ..:/app
      # Hack: Sử dụng anonymous volume cho node_modules để tránh
      # việc node_modules của host (Windows/Mac) ghi đè lên node_modules của container (Alpine/Linux)
      # Điều này cực quan trọng khi dùng native modules (sharp, worker threads).
      - /app/node_modules
      - /app/uploads
    ports:
      - "8080:8080"
      - "9229:9229" # Port Debug
    networks:
      - rbac_dev_net
    command: ["/entrypoint.sh"]

networks:
  rbac_dev_net:
    driver: bridge

volumes:
  pgdata_dev: