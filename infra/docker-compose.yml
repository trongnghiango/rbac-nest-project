services:
  postgres:
    image: postgres:15-alpine
    container_name: rbac_postgres_prod
    restart: always
    # 👇 QUAN TRỌNG: Trỏ đúng file .env.production
    env_file:
      - ../.env.production
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - pgdata_prod:/var/lib/postgresql/data
    networks:
      - rbac_prod_net
    healthcheck:
      # Fix healthcheck để dùng biến môi trường
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G

  redis:
    image: redis:7-alpine
    container_name: rbac_redis_prod
    restart: always
    networks:
      - rbac_prod_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M

  api:
    build:
      context: ..
      # Dùng file Dockerfile (bản merge/prod)
      dockerfile: infra/docker/Dockerfile
    container_name: rbac_api_prod
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # 👇 QUAN TRỌNG: Trỏ đúng file .env.production
    env_file:
      - ../.env.production
    environment:
      # Truyền lại biến để đảm bảo entrypoint nhận được giá trị từ .env.production
      - DB_HOST=postgres
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - DB_PORT=${DB_PORT}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - RUN_MIGRATIONS=true
      - NODE_ENV=production
    volumes:
      - dental_data:/app/uploads
      - api_logs:/app/logs
    ports:
      - "8080:8080"
    networks:
      - rbac_prod_net
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G

networks:
  rbac_prod_net:
    driver: bridge

volumes:
  pgdata_prod:
  dental_data:
  api_logs: